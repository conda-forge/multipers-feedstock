{% set name = "multipers" %}
{% set version = "2.6.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 06ed980dae94ff2935968d7ea979b6fb80827ef882725886386f1730fee077ac

build:
  script: |
    export CONDA_PREFIX="${PREFIX}"  # [unix]
    export CMAKE_GENERATOR=Ninja  # [unix]
    export CMAKE_BUILD_PARALLEL_LEVEL=2  # [unix]
    set "CONDA_PREFIX=%PREFIX:\=/%"  # [win]
    set "CMAKE_BUILD_PARALLEL_LEVEL=%CPU_COUNT%"  # [win]
    {{ PYTHON }} -m pip install . -vv --no-build-isolation --no-deps
  number: 0
  skip: true  # [py<=39]
  missing_dso_whitelist:
    - $RPATH/multipers_core.dll              # [win]

requirements:
  build:
    - {{ compiler("c") }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy >=2                              # [build_platform != target_platform]
    - nanobind                               # [build_platform != target_platform]
    - pip                                    # [build_platform != target_platform]
    - python-build                           # [build_platform != target_platform]
    - wheel                                  # [build_platform != target_platform]
    - scikit-build-core                      # [build_platform != target_platform]
    - ninja
    - cmake >=3.27
    - patch                                  # [unix]
    - m2-patch                               # [win]
  host:
    - python
    - numpy >=2
    - python-build
    - nanobind
    - scikit-build-core
    - wheel
    - pip
    - tbb
    - tbb-devel
    - libboost-devel
    - cgal-cpp
    - gmp
    - mpfr
    - eigen
    - llvm-openmp                            # [osx]
    - libgomp                                # [linux]
    - intel-openmp                           # [win]
  run:
    - python
    - tbb
    - {{ pin_compatible('numpy') }}
    - gudhi >=3.10
    - tqdm
    - scipy
    - joblib
    - matplotlib-base
    - scikit-learn
    - pot
    - llvm-openmp                            # [osx]
    - libgomp                                # [linux]
    - intel-openmp                           # [win]


test:
  imports:
    - multipers
  requires:
    - pip
  commands:
    - pip install pykeops filtration-domination --upgrade
    - pip check
about:
  home: https://davidlapous.github.io/multipers/
  summary: Multiparameter Topological Persistence for Machine Learning
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - DavidLapous
